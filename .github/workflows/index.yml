name: Build index

# Keep index.json in sync with skills/*.json so contributors only add a skill
# file — the browse index regenerates itself when their PR merges.
on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Rebuild index.json
        run: node scripts/build-index.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: rebuild index.json [skip ci]"
            git push
          else
            echo "index.json already up to date"
          fi
